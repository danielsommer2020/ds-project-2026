name: Weekly Streaming Update

on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-streaming:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: List all files (debug)
        run: ls -la

      - name: Fetch movie streaming data
        run: python3 fetch_streaming.py
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}

      - name: Fetch TV show streaming data
        run: python3 fetch_tv_streaming.py
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}

      - name: Rebuild app (movies.json + MovieMatch.html)
        run: python3 rebuild_app.py movie_database_streaming.json

      - name: Rebuild TV shows (tvshows.json)
        run: python3 rebuild_tv.py

      - name: Commit and push
        run: |
          git config user.name  "MovieMatch Bot"
          git config user.email "moviematch-bot@users.noreply.github.com"
          git add movie_database_streaming.json index.html MovieMatch*.html movies.json tvshows.json
          git diff --staged --quiet || git commit -m "Weekly streaming update $(date +%Y-%m-%d)"
          git push
