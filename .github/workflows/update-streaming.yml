name: Weekly Streaming Update

on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

permissions:
  contents: write

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-streaming:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: List repo files
        run: |
          echo "=== Repo contents ==="
          ls -la
          echo ""
          echo "=== Python files ==="
          ls -la *.py || echo "No .py files found"
          echo ""
          echo "=== JSON files ==="
          ls -la *.json || echo "No .json files found"
          echo ""
          echo "=== HTML files ==="
          ls -la *.html || echo "No .html files found"

      - name: Fetch streaming data
        run: python3 fetch_streaming.py
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}

      - name: Rebuild app
        run: python3 rebuild_app.py movie_database_streaming.json

      - name: Commit and push
        run: |
          git config user.name  "MovieMatch Bot"
          git config user.email "moviematch-bot@users.noreply.github.com"
          git add movie_database_streaming.json MovieMatch*.html movies.json
          git diff --staged --quiet || git commit -m "🎬 Weekly streaming update $(date +%Y-%m-%d)"
          git push
